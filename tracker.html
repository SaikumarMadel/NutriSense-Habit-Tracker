<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="NutriSense Daily Logger — Quick-log meals with calories and macros, view today's history.">
  <title>Daily Logger | NutriSense</title>

  <link rel="manifest" href="assets/manifest.json">
  <meta name="theme-color" content="#22c55e">

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .log-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      gap: 0.75rem;
    }
    .log-item:last-child { border-bottom: none; }
    .log-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body class="fade-in">
  <div class="container">
    <header class="card-header">
      <a href="index.html"
        aria-label="Back to dashboard">
        <i class="material-icons-round"
          aria-hidden="true">arrow_back</i>
      </a>
      <h2 class="text-center">Daily Meal Log</h2>
      <div style="width: 24px;"></div>
    </header>

    <main>
      <section class="card"
        aria-labelledby="quick-log-heading">
        <h3 id="quick-log-heading">Quick Log</h3>
        <form id="quick-log-form">
          <div class="form-group">
            <label for="meal-name"
              class="label">Meal Name</label>
            <input type="text" id="meal-name"
              name="name" class="input-field"
              placeholder="e.g. Scrambled Eggs"
              required>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
              <label for="log-calories"
                class="label">Calories (kcal)</label>
              <input type="number"
                id="log-calories"
                name="calories"
                class="input-field"
                placeholder="0" required min="0">
            </div>
            <div class="form-group">
              <label for="log-slot"
                class="label">Meal Slot</label>
              <select id="log-slot" name="slot"
                class="input-field">
                <option value="breakfast">
                  Breakfast</option>
                <option value="lunch">
                  Lunch</option>
                <option value="dinner">
                  Dinner</option>
                <option value="snack">
                  Snack</option>
              </select>
            </div>
          </div>

          <details class="mb-2">
            <summary class="small text-accent"
              style="cursor: pointer;
                margin-bottom: 1rem;">
              Advanced Macros (Optional)
            </summary>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem;">
              <div class="form-group">
                <label for="log-protein"
                  class="label small">
                  Protein (g)</label>
                <input type="number"
                  id="log-protein"
                  name="protein"
                  class="input-field"
                  placeholder="0" min="0">
              </div>
              <div class="form-group">
                <label for="log-carbs"
                  class="label small">
                  Carbs (g)</label>
                <input type="number"
                  id="log-carbs"
                  name="carbs"
                  class="input-field"
                  placeholder="0" min="0">
              </div>
              <div class="form-group">
                <label for="log-fat"
                  class="label small">
                  Fat (g)</label>
                <input type="number"
                  id="log-fat"
                  name="fat"
                  class="input-field"
                  placeholder="0" min="0">
              </div>
            </div>
          </details>

          <button type="submit"
            class="btn btn-primary btn-full">
            <i class="material-icons-round"
              aria-hidden="true">add</i>
            Log Meal
          </button>
        </form>
      </section>

      <section class="card"
        aria-labelledby="history-heading">
        <div class="card-header">
          <h3 id="history-heading">
            Today's History</h3>
          <span class="badge badge-green"
            id="daily-total"
            aria-live="polite">0 kcal</span>
        </div>
        <div id="logs-list" aria-live="polite">
          <p class="text-center text-muted small py-2">
            No meals logged yet today.
          </p>
        </div>
      </section>
    </main>

    <nav class="nav-bar"
      aria-label="Main navigation">
      <a href="index.html" class="nav-item">
        <i class="material-icons-round"
          aria-hidden="true">home</i>
        <span>Home</span>
      </a>
      <a href="planner.html" class="nav-item">
        <i class="material-icons-round"
          aria-hidden="true">restaurant_menu</i>
        <span>Planner</span>
      </a>
      <a href="tracker.html"
        class="nav-item active"
        aria-current="page">
        <i class="material-icons-round"
          aria-hidden="true">add_box</i>
        <span>Tracker</span>
      </a>
      <a href="insights.html" class="nav-item">
        <i class="material-icons-round"
          aria-hidden="true">bar_chart</i>
        <span>Insights</span>
      </a>
    </nav>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/tracker.js"></script>
  <script src="js/suggestions.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener(
      'DOMContentLoaded', renderLogs
    );

    document.getElementById('quick-log-form')
      .addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const meal = {
          name: fd.get('name'),
          calories:
            parseInt(fd.get('calories')) || 0,
          slot: fd.get('slot'),
          protein:
            parseInt(fd.get('protein')) || 0,
          carbs:
            parseInt(fd.get('carbs')) || 0,
          fat:
            parseInt(fd.get('fat')) || 0
        };

        if (!meal.name || meal.calories <= 0) {
          App.toast(
            'Please enter a name and calories.',
            'error'
          );
          return;
        }

        Tracker.logMeal(meal);
        e.target.reset();
        renderLogs();
        App.toast(
          `${meal.name} logged — ${meal.calories} kcal ✅`
        );
      });

    function renderLogs() {
      const today = Tracker.getTodayKey();
      const logs =
        Storage.get(`ns_logs_${today}`) || [];
      const list =
        document.getElementById('logs-list');
      const totalEl =
        document.getElementById('daily-total');

      if (logs.length === 0) {
        list.innerHTML =
          '<p class="text-center text-muted small py-2">No meals logged yet today.</p>';
        totalEl.textContent = '0 kcal';
        return;
      }

      let totalCals = 0;
      let html = '';

      // Show newest first (copy first)
      const sorted = [...logs].reverse();
      sorted.forEach((log, index) => {
        totalCals += log.calories;
        const time = new Date(log.timestamp)
          .toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit'
          });

        html += `
          <div class="log-item slide-up"
            style="animation-delay: ${index * 0.05}s">
            <div style="flex: 1; min-width: 0;">
              <strong>
                ${App.sanitize(log.name)}
              </strong>
              <div class="log-meta">
                <span class="badge badge-blue">
                  ${log.slot}</span>
                <span>• ${time}</span>
              </div>
            </div>
            <div style="text-align: right;
              white-space: nowrap;">
              <div>${log.calories} kcal</div>
              <div class="small text-muted">
                ${log.protein}p /
                ${log.carbs}c /
                ${log.fat}f
              </div>
            </div>
            <button
              class="btn btn-ghost"
              aria-label="Delete ${App.sanitize(log.name)}"
              style="padding: 0.5rem;"
              onclick="deleteLog(${logs.length - 1 - index})">
              <i class="material-icons-round"
                aria-hidden="true"
                style="color: var(--accent-orange);">
                delete</i>
            </button>
          </div>
        `;
      });

      list.innerHTML = html;
      totalEl.textContent = `${totalCals} kcal`;
    }

    function deleteLog(index) {
      const today = Tracker.getTodayKey();
      const logs =
        Storage.get(`ns_logs_${today}`) || [];
      const removed = logs[index];
      logs.splice(index, 1);
      Storage.set(`ns_logs_${today}`, logs);
      renderLogs();
      App.toast(
        `Removed ${removed ? removed.name : 'meal'}`,
        'info'
      );
    }
  </script>
</body>
</html>
