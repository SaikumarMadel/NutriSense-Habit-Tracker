<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="NutriSense Food Scanner — Search over 3 million products and instantly view nutrition facts.">
  <title>Food Scanner | NutriSense</title>

  <link rel="manifest" href="assets/manifest.json">
  <meta name="theme-color" content="#22c55e">

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .search-container {
      position: sticky;
      top: 0;
      background: var(--bg-primary);
      padding: 1rem 0;
      z-index: 10;
    }
    .product-img {
      width: 60px;
      height: 60px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      background: var(--bg-secondary);
    }
    .macro-chips {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    .macro-chip {
      font-size: 0.7rem;
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body class="fade-in">
  <div class="container">
    <header class="card-header">
      <a href="index.html"
        aria-label="Back to dashboard">
        <i class="material-icons-round"
          aria-hidden="true">arrow_back</i>
      </a>
      <h2 class="text-center">Food Scanner</h2>
      <div style="width: 24px;"></div>
    </header>

    <main>
      <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
      <div class="search-container">
        <div class="form-group mb-2"
          style="position: relative;">
          <label for="search-input"
            class="sr-only">Search food products</label>
          <input type="text" id="search-input"
            class="input-field"
            placeholder="Search product name..."
            autocomplete="off"
            style="padding-left: 3rem;">
          <i class="material-icons-round"
            aria-hidden="true"
            style="position: absolute; left: 1rem; top: 0.85rem; color: var(--text-muted);">search</i>
        </div>
        
        <button id="scan-btn" class="btn btn-ghost btn-full" style="color: var(--accent-green); border-color: rgba(16, 185, 129, 0.3);">
          <i class="material-icons-round" aria-hidden="true">camera_alt</i> Scan Barcode
        </button>
        
        <div id="reader" style="width: 100%; margin-top: 1rem; border-radius: var(--radius-sm); overflow: hidden; display: none;"></div>
      </div>

      <div id="loading-state" style="display: none;"
        aria-label="Loading results">
        <div class="card"
          style="display: flex; gap: 1rem;">
          <div class="skeleton"
            style="width: 60px; height: 60px;"></div>
          <div style="flex: 1;">
            <div class="skeleton"
              style="height: 1.25rem; width: 60%; margin-bottom: 0.5rem;"></div>
            <div class="skeleton"
              style="height: 1rem; width: 40%;"></div>
          </div>
        </div>
        <div class="card"
          style="display: flex; gap: 1rem;">
          <div class="skeleton"
            style="width: 60px; height: 60px;"></div>
          <div style="flex: 1;">
            <div class="skeleton"
              style="height: 1.25rem; width: 60%; margin-bottom: 0.5rem;"></div>
            <div class="skeleton"
              style="height: 1rem; width: 40%;"></div>
          </div>
        </div>
      </div>

      <div id="results-container"
        aria-live="polite">
        <div class="text-center text-muted"
          style="margin-top: 4rem;">
          <i class="material-icons-round"
            style="font-size: 4rem; opacity: 0.2;"
            aria-hidden="true">restaurant</i>
          <p>Search over 3 million products</p>
        </div>
      </div>
    </main>

    <nav class="nav-bar"
      aria-label="Main navigation">
      <a href="index.html" class="nav-item">
        <i class="material-icons-round"
          aria-hidden="true">home</i>
        <span>Home</span>
      </a>
      <a href="planner.html" class="nav-item">
        <i class="material-icons-round"
          aria-hidden="true">restaurant_menu</i>
        <span>Planner</span>
      </a>
      <a href="tracker.html" class="nav-item">
        <i class="material-icons-round"
          aria-hidden="true">add_box</i>
        <span>Tracker</span>
      </a>
      <a href="insights.html" class="nav-item">
        <i class="material-icons-round"
          aria-hidden="true">bar_chart</i>
        <span>Insights</span>
      </a>
    </nav>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/nutrition.js"></script>
  <script src="js/tracker.js"></script>
  <script src="js/app.js"></script>
  <script>
    const searchInput =
      document.getElementById('search-input');
    const resultsContainer =
      document.getElementById('results-container');
    const loadingState =
      document.getElementById('loading-state');

    let debounceTimer;

    searchInput.addEventListener('input', (e) => {
      clearTimeout(debounceTimer);
      const query = e.target.value.trim();

      if (query.length < 2) {
        resultsContainer.innerHTML = `
          <div class="text-center text-muted"
            style="margin-top: 4rem;">
            <i class="material-icons-round"
              style="font-size: 4rem; opacity: 0.2;"
              aria-hidden="true">restaurant</i>
            <p>Search over 3 million products</p>
          </div>
        `;
        return;
      }

      debounceTimer = setTimeout(
        () => performSearch(query), 500
      );
    });

    async function performSearch(query) {
      loadingState.style.display = 'block';
      resultsContainer.innerHTML = '';

      try {
        const results =
          await Nutrition.searchFood(query);
        loadingState.style.display = 'none';

        if (results.length === 0) {
          resultsContainer.innerHTML =
            `<p class="text-center text-muted">
              No results found for
              "${App.sanitize(query)}"
            </p>`;
          return;
        }

        results.forEach((product, idx) => {
          const card =
            document.createElement('article');
          card.className = 'card slide-up';
          card.style.display = 'flex';
          card.style.gap = '1rem';
          card.style.animationDelay =
            `${idx * 0.1}s`;

          card.innerHTML = `
            <img src="${product.image}"
              alt="${App.sanitize(product.name)}"
              class="product-img"
              loading="lazy">
            <div style="flex: 1;">
              <h4 style="font-size: 0.9rem;">
                ${App.sanitize(product.name)}
              </h4>
              <p class="small text-muted">
                ${App.sanitize(product.brand)}
              </p>
              <div class="macro-chips">
                <span class="macro-chip">
                  🔥 ${Nutrition.formatNutriment(product.calories)} kcal
                </span>
                <span class="macro-chip">
                  P: ${Nutrition.formatNutriment(product.protein)}g
                </span>
                <span class="macro-chip">
                  C: ${Nutrition.formatNutriment(product.carbs)}g
                </span>
                <span class="macro-chip">
                  F: ${Nutrition.formatNutriment(product.fat)}g
                </span>
              </div>
            </div>
            <button class="btn btn-ghost"
              aria-label="Log ${App.sanitize(product.name)}"
              style="padding: 0.5rem;">
              <i class="material-icons-round"
                aria-hidden="true">add</i>
            </button>
          `;

          // Attach click via JS, not inline
          const btn =
            card.querySelector('button');
          btn.addEventListener('click', () => {
            Tracker.logMeal({
              name: product.name,
              calories: product.calories || 0,
              protein: product.protein || 0,
              carbs: product.carbs || 0,
              fat: product.fat || 0,
              slot: 'snack'
            });
            App.toast(
              `Logged ${product.name} ✅`
            );
          });

          resultsContainer.appendChild(card);
        });
      } catch (err) {
        loadingState.style.display = 'none';
        resultsContainer.innerHTML =
          `<div class="text-center"
            style="margin-top: 3rem;">
            <i class="material-icons-round"
              style="font-size: 3rem;
                color: var(--accent-orange);"
              aria-hidden="true">wifi_off</i>
            <p class="text-muted mt-1">
              Can't reach the food database.
              Check your connection.
            </p>
          </div>`;
      }
    }

    // --- Barcode Scanner Logic ---
    const scanBtn = document.getElementById('scan-btn');
    const readerDiv = document.getElementById('reader');
    let html5QrCode;

    scanBtn.addEventListener('click', () => {
      if (html5QrCode) {
        // Stop scanning
        html5QrCode.stop().then(() => {
          html5QrCode.clear();
          html5QrCode = null;
          readerDiv.style.display = 'none';
          scanBtn.innerHTML = '<i class="material-icons-round" aria-hidden="true">camera_alt</i> Scan Barcode';
        }).catch(err => console.error("Could not stop camera", err));
      } else {
        // Start scanning
        readerDiv.style.display = 'block';
        scanBtn.innerHTML = '<i class="material-icons-round" aria-hidden="true">stop_circle</i> Stop Camera';
        
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        
        html5QrCode.start({ facingMode: "environment" }, config, async (decodedText) => {
          // Success callback
          App.toast(`Barcode read: ${decodedText}`);
          html5QrCode.stop().then(() => {
            html5QrCode.clear();
            html5QrCode = null;
            readerDiv.style.display = 'none';
            scanBtn.innerHTML = '<i class="material-icons-round" aria-hidden="true">camera_alt</i> Scan Barcode';
          });
          
          searchInput.value = decodedText;
          await performSearch(decodedText);
          
        }, (errorMessage) => {
          // Failure callback is noisy, ignore
        }).catch((err) => {
          App.toast("Failed to access camera. Check permissions.", "error");
          readerDiv.style.display = 'none';
          scanBtn.innerHTML = '<i class="material-icons-round" aria-hidden="true">camera_alt</i> Scan Barcode';
          html5QrCode = null;
        });
      }
    });

  </script>
</body>
</html>
